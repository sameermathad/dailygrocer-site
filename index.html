<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DailyGrocer — Order on WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    --green-deep:#14532d;      /* header, brand */
    --green-leaf:#1a7a3f;      /* accents */
    --wa-green:#25d366;        /* WhatsApp CTA — familiar */
    --wa-green-dark:#1eb355;
    --turmeric:#e8a020;        /* highlights, badges */
    --paper:#ffffff;
    --bg:#f4f5f2;
    --ink:#1c2420;
    --ink-soft:#5c6660;
    --line:#e3e6e0;
    --receipt:#fffdf6;
    --radius:14px;
    --shadow:0 1px 3px rgba(20,40,25,.08);
    --font-display:"Baloo 2", system-ui, sans-serif;
    --font-body:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);padding-bottom:110px}
  button{font-family:inherit;border:none;cursor:pointer;background:none}
  input,select{font-family:inherit}

  /* ============ HEADER ============ */
  header{background:var(--green-deep);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:40}
  .brand-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-family:var(--font-display);font-weight:800;font-size:1.45rem;letter-spacing:.2px;line-height:1}
  .brand span{color:var(--turmeric)}
  .branch-pick{display:flex;align-items:center;gap:6px;font-size:.78rem;opacity:.95}
  .branch-pick select{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:6px 8px;font-size:.8rem;max-width:150px}
  .branch-pick select option{color:var(--ink)}
  .tagline{font-size:.72rem;opacity:.75;margin-top:4px}

  .search-wrap{margin-top:12px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45}
  #search{width:100%;padding:11px 12px 11px 38px;border-radius:10px;border:none;font-size:.95rem;
    background:#fff;color:var(--ink);outline:none}

  /* ============ MONTHLY BASKET BANNER ============ */
  .basket-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 16px 0;
    background:#fff;border:1.5px solid var(--turmeric);border-radius:12px;padding:10px 14px}
  .basket-text strong{font-size:.88rem;color:var(--green-deep);display:block}
  .basket-text span{font-size:.72rem;color:var(--ink-soft)}
  .basket-btn{background:var(--turmeric);color:#fff;font-weight:800;font-size:.8rem;padding:9px 16px;
    border-radius:9px;white-space:nowrap;flex-shrink:0}
  .basket-btn:active{transform:scale(.96)}
  .basket-notice{font-size:.74rem;color:#a06b00;font-weight:600;margin:6px 16px 0;display:none}
  .basket-notice.show{display:block}
  @media(min-width:820px){.basket-banner{max-width:960px;margin-left:auto;margin-right:auto}}

  /* ============ CATEGORY CHIPS ============ */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none;background:var(--bg);
    position:sticky;top:118px;z-index:30}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 15px;border-radius:20px;background:#fff;border:1.5px solid var(--line);
    font-size:.85rem;font-weight:600;color:var(--ink-soft);white-space:nowrap;transition:all .15s}
  .chip.active{background:var(--green-leaf);border-color:var(--green-leaf);color:#fff}

  /* ============ PRODUCT GRID ============ */
  .section-label{padding:14px 16px 6px;font-size:.72rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px 16px 16px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}
    header .head-inner,.chips{max-width:960px;margin-left:auto;margin-right:auto}}

  .card{background:var(--paper);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:6px;border:1px solid transparent;transition:border-color .15s}
  .card.in-cart{border-color:var(--green-leaf)}
  .card.out-of-stock{opacity:.6}
  .stock-badge{font-size:.66rem;font-weight:700;color:#a06b00;background:#fdf3df;
    padding:3px 7px;border-radius:6px;width:fit-content}
  .emoji{font-size:1.9rem;line-height:1}
  .p-name{font-size:.86rem;font-weight:600;line-height:1.25;min-height:2.2em}
  .p-pack{font-size:.74rem;color:var(--ink-soft)}
  .p-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:4px}
  .p-price{font-weight:700;font-size:.95rem}
  .p-price small{font-weight:500;color:var(--ink-soft);font-size:.7rem;text-decoration:line-through;margin-left:4px}

  .add-btn{background:var(--green-leaf);color:#fff;font-weight:700;font-size:.8rem;
    padding:7px 16px;border-radius:9px;transition:transform .1s}
  .add-btn:active{transform:scale(.94)}
  .add-btn.disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}
  .add-btn.disabled:active{transform:none}
  .stepper{display:flex;align-items:center;gap:0;background:var(--green-leaf);border-radius:9px;overflow:hidden}
  .stepper button{color:#fff;font-size:1.05rem;font-weight:700;width:32px;height:32px;display:flex;
    align-items:center;justify-content:center}
  .stepper button:disabled{opacity:.4;cursor:not-allowed}
  .stepper .qty{color:#fff;font-weight:700;font-size:.88rem;min-width:24px;text-align:center}

  .empty-msg{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:.9rem}

  /* ============ STICKY CART BAR ============ */
  .cart-bar{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    z-index:50;pointer-events:none}
  .cart-bar-inner{max-width:560px;margin:0 auto;pointer-events:auto;background:var(--green-deep);color:#fff;
    border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
    box-shadow:0 6px 24px rgba(20,60,30,.35);transform:translateY(140%);transition:transform .25s ease}
  .cart-bar.show .cart-bar-inner{transform:translateY(0)}
  .cart-info{font-size:.8rem;line-height:1.3}
  .cart-info b{font-size:1rem}
  .view-cart-btn{background:var(--wa-green);color:#063;color:#0b3d20;font-weight:800;font-size:.9rem;
    padding:11px 18px;border-radius:11px;white-space:nowrap}

  /* ============ CART SHEET (receipt style) ============ */
  .overlay{position:fixed;inset:0;background:rgba(15,25,18,.5);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--receipt);
    border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;
    transform:translateY(105%);transition:transform .28s ease;max-width:560px;margin:0 auto}
  .sheet.show{transform:translateY(0)}
  .sheet-head{padding:16px 18px 10px;border-bottom:2px dashed var(--line);display:flex;justify-content:space-between;align-items:flex-start}
  .sheet-title{font-family:var(--font-display);font-weight:800;font-size:1.15rem;color:var(--green-deep)}
  .sheet-sub{font-size:.74rem;color:var(--ink-soft);margin-top:2px}
  .close-x{font-size:1.3rem;color:var(--ink-soft);padding:4px 8px}
  .sheet-body{overflow-y:auto;padding:6px 18px;flex:1}
  .r-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dotted var(--line)}
  .r-item:last-child{border-bottom:none}
  .r-name{flex:1;min-width:0}
  .r-name .n{font-size:.88rem;font-weight:600}
  .r-name .p{font-size:.73rem;color:var(--ink-soft)}
  .r-stepper{display:flex;align-items:center;border:1.5px solid var(--green-leaf);border-radius:8px;overflow:hidden}
  .r-stepper button{color:var(--green-leaf);width:28px;height:28px;font-weight:800;font-size:1rem}
  .r-stepper .qty{font-weight:700;font-size:.85rem;min-width:22px;text-align:center;color:var(--green-deep)}
  .r-amt{font-weight:700;font-size:.88rem;min-width:58px;text-align:right}

  .r-fields{padding:10px 0 4px;border-top:2px dashed var(--line);margin-top:6px}
  .r-fields label{font-size:.74rem;font-weight:700;color:var(--ink-soft);display:block;margin:10px 0 4px}
  .r-fields input,.r-fields textarea,.r-fields select{width:100%;padding:10px;border:1.5px solid var(--line);
    border-radius:9px;font-size:.9rem;background:#fff;outline-color:var(--green-leaf)}
  .r-fields textarea{resize:none;height:60px}
  .r-fields .req{color:#c0392b}
  .r-fields input.invalid,.r-fields textarea.invalid{border-color:#c0392b}
  .error-msg{font-size:.72rem;color:#c0392b;font-weight:600;margin-top:4px;display:none}
  .error-msg.show{display:block}
  .slot-row{display:flex;gap:8px}
  .slot{flex:1;padding:9px 4px;border:1.5px solid var(--line);border-radius:9px;background:#fff;
    font-size:.78rem;font-weight:600;color:var(--ink-soft);text-align:center}
  .slot.active{border-color:var(--turmeric);background:#fdf3df;color:#7a5510}

  .sub-row{display:flex;flex-direction:column;gap:6px}
  .sub-opt{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid var(--line);
    border-radius:9px;background:#fff;font-size:.82rem;font-weight:600;color:var(--ink-soft);text-align:left}
  .sub-opt::before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid var(--line);flex-shrink:0}
  .sub-opt.active{border-color:var(--green-leaf);background:#e7f5ec;color:var(--green-deep)}
  .sub-opt.active::before{border-color:var(--green-leaf);background:var(--green-leaf);box-shadow:inset 0 0 0 3px #fff}

  .sheet-foot{padding:12px 18px calc(14px + env(safe-area-inset-bottom));border-top:2px dashed var(--line);background:var(--receipt)}
  .totals{font-size:.84rem;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .totals .row{display:flex;justify-content:space-between}
  .totals .grand{font-size:1.05rem;font-weight:800;color:var(--ink)}
  .free-note{font-size:.75rem;color:var(--green-leaf);font-weight:700}
  .almost-note{font-size:.75rem;color:#a06b00;font-weight:600}
  .sla-note{font-size:.72rem;color:var(--ink-soft);text-align:center;margin-bottom:8px;font-weight:600}
  .wa-btn{width:100%;background:var(--wa-green);color:#0b3d20;font-weight:800;font-size:1rem;
    padding:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .15s}
  .wa-btn:active{background:var(--wa-green-dark)}
  .wa-btn svg{flex-shrink:0}
  .copy-btn{width:100%;background:#fff;color:var(--green-deep);font-weight:700;font-size:.88rem;
    padding:11px;border-radius:12px;margin-top:8px;border:1.5px solid var(--line);transition:background .15s,border-color .15s}
  .copy-btn:active{background:var(--bg)}
  .copy-btn.copied{border-color:var(--green-leaf);color:var(--green-leaf)}
  .foot-hint{text-align:center;font-size:.7rem;color:var(--ink-soft);margin-top:8px}

  /* ============ PRODUCT DETAIL SHEET ============ */
  .detail-sheet{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--paper);
    border-radius:20px 20px 0 0;transform:translateY(105%);transition:transform .28s ease;
    max-width:560px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
  .detail-sheet.show{transform:translateY(0)}
  .detail-top{display:flex;justify-content:flex-end;padding:10px 12px 0}
  .detail-hero{text-align:center;padding:4px 24px 0}
  .detail-hero .big-emoji{font-size:4.2rem;line-height:1.1;display:block}
  .detail-body{padding:12px 22px 20px}
  .d-brand{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--turmeric)}
  .d-name{font-family:var(--font-display);font-weight:700;font-size:1.35rem;color:var(--green-deep);line-height:1.2;margin-top:2px}
  .d-pack{font-size:.85rem;color:var(--ink-soft);margin-top:2px}
  .d-desc{font-size:.87rem;line-height:1.55;color:var(--ink);margin-top:12px}
  .d-price-row{display:flex;align-items:baseline;gap:8px;margin-top:14px}
  .d-price{font-weight:800;font-size:1.4rem}
  .d-mrp{font-size:.85rem;color:var(--ink-soft);text-decoration:line-through}
  .d-save{font-size:.75rem;font-weight:700;color:var(--green-leaf);background:#e7f5ec;
    padding:3px 9px;border-radius:12px}
  .d-actions{margin-top:16px}
  .d-actions .add-btn{width:100%;padding:14px;font-size:1rem;border-radius:12px}
  .d-actions .stepper{width:100%;justify-content:space-between;border-radius:12px}
  .d-actions .stepper button{width:52px;height:48px;font-size:1.3rem}
  .d-actions .stepper .qty{font-size:1.05rem}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="brand-row">
      <div>
        <div class="brand">Daily<span>Grocer</span></div>
        <div class="tagline">Your neighbourhood store, since 2009</div>
      </div>
      <div class="branch-pick" id="branchPick">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
        <select id="branch" aria-label="Choose branch"></select>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="search" type="search" placeholder="Search atta, milk, oil…" autocomplete="off">
    </div>
  </div>
</header>

<div class="basket-banner" id="basketBanner">
  <div class="basket-text"><strong>🧺 Monthly Basket</strong><span id="basketCount"></span></div>
  <button class="basket-btn" onclick="addMonthlyBasket()">Add all</button>
</div>
<div class="basket-notice" id="basketNotice"></div>

<nav class="chips" id="chips" aria-label="Categories"></nav>
<main id="catalog"></main>

<!-- sticky cart bar -->
<div class="cart-bar" id="cartBar">
  <div class="cart-bar-inner">
    <div class="cart-info"><b id="barTotal">₹0</b><br><span id="barCount">0 items</span></div>
    <button class="view-cart-btn" onclick="openSheet()">View order →</button>
  </div>
</div>

<!-- cart sheet -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="Your order">
  <div class="sheet-head">
    <div>
      <div class="sheet-title">Your order</div>
      <div class="sheet-sub" id="sheetBranch"></div>
    </div>
    <button class="close-x" onclick="closeSheet()" aria-label="Close">✕</button>
  </div>
  <div class="sheet-body">
    <div id="receiptItems"></div>
    <div class="r-fields">
      <label for="custName">Name <span class="req">*</span></label>
      <input id="custName" placeholder="e.g. Ramesh">
      <div class="error-msg" id="custNameErr"></div>
      <label for="custAddr">Delivery address (flat / street / landmark) <span class="req">*</span></label>
      <textarea id="custAddr" placeholder="e.g. 302, Sri Sai Residency, near SBI ATM, Kukatpally"></textarea>
      <div class="error-msg" id="custAddrErr"></div>
      <label>Delivery slot</label>
      <div class="slot-row" id="slots"></div>
      <label>If something's unavailable</label>
      <div class="sub-row" id="subPref"></div>
    </div>
  </div>
  <div class="sheet-foot">
    <div class="totals">
      <div class="row"><span>Items total</span><span id="tItems">₹0</span></div>
      <div class="row"><span>Delivery</span><span id="tDelivery">₹0</span></div>
      <div class="row grand"><span>To pay on delivery</span><span id="tGrand">₹0</span></div>
      <div id="freeNote"></div>
    </div>
    <div class="sla-note" id="slaNote"></div>
    <button class="wa-btn" onclick="sendToWhatsApp()">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="#0b3d20"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm5.4 14.1c-.2.6-1.3 1.2-1.8 1.3-.5 0-1 .2-3.4-.7-2.9-1.1-4.7-4-4.9-4.2-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.4l.9 2.1c.1.2.1.4 0 .6l-.4.6-.5.5c-.2.2-.3.4-.1.7.2.3.9 1.5 2 2.4 1.4 1.2 2.5 1.6 2.9 1.8.3.2.5.1.7-.1l1-1.2c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.6.4 0 .1 0 .7-.2 1.3z"/></svg>
      Send order on WhatsApp
    </button>
    <button class="copy-btn" id="copyBtn" onclick="copyOrder()">Copy order</button>
    <div class="foot-hint">Opens WhatsApp with your order typed out — just press send. Pay by UPI or cash on delivery.</div>
  </div>
</div>

<!-- product detail sheet -->
<div class="detail-sheet" id="detailSheet" role="dialog" aria-label="Product details">
  <div class="detail-top"><button class="close-x" onclick="closeDetail()" aria-label="Close">✕</button></div>
  <div class="detail-hero"><span class="big-emoji" id="dEmoji"></span></div>
  <div class="detail-body">
    <div class="d-brand" id="dBrand"></div>
    <div class="d-name" id="dName"></div>
    <div class="d-pack" id="dPack"></div>
    <div class="d-desc" id="dDesc"></div>
    <div class="d-price-row">
      <span class="d-price" id="dPrice"></span>
      <span class="d-mrp" id="dMrp"></span>
      <span class="d-save" id="dSave"></span>
    </div>
    <div class="d-actions" id="dActions"></div>
  </div>
</div>

<script>
/* ================================================================
   STORE CONFIGURATION — everything the shop staff edits lives here.
   No other part of the file needs touching for day-to-day changes.
   ================================================================ */
const STORE = {
  name: "DailyGrocer",
  // One WhatsApp number per branch (country code, no + or spaces).
  // slug is used in the shareable link (?branch=slug) and in the stock-override sheet's branch_slug column.
  branches: [
    { slug:"kukatpally", name: "Kukatpally",   phone: "919121021469" },
    { slug:"miyapur",    name: "Miyapur",      phone: "919121021469" },
    { slug:"kphb",       name: "KPHB",         phone: "919121021469" },
    { slug:"nizampet",   name: "Nizampet",     phone: "919121021469" },
  ],
  deliveryFee: 20,          // ₹ flat fee
  freeDeliveryAbove: 499,   // ₹ threshold for free delivery
  slots: ["ASAP (1–2 hrs)", "Today evening", "Tomorrow morning"],

  // Shown near the checkout button — sets the human-confirmation expectation.
  confirmationSla: "We confirm your order on WhatsApp within 15 minutes (store hours).",

  // Customer's choice for handling any item that turns out unavailable. First option is the default.
  substitutionOptions: [
    { value:"replace", label:"Replace with similar" },
    { value:"call",    label:"Call me first" },
    { value:"remove",  label:"Just remove it" },
  ],

  // One-tap preset for the core monthly staples order. { id, qty } — id must match a PRODUCTS entry.
  monthlyBasket: [
    { id:1,  qty:4 },  // Toned Milk
    { id:8,  qty:1 },  // Eggs
    { id:9,  qty:1 },  // Whole Wheat Atta
    { id:10, qty:1 },  // Sona Masoori Rice
    { id:12, qty:2 },  // Toor Dal
    { id:14, qty:1 },  // Sunflower Oil
    { id:16, qty:1 },  // Iodised Salt
    { id:17, qty:1 },  // Sugar
    { id:20, qty:1 },  // Tea Powder
    { id:26, qty:2 },  // Bread
  ],

  // Published-to-web Google Sheet CSV (File > Share > Publish to web > CSV), columns: item_code, branch_slug, available (Y/N).
  // Lets staff kill-switch fast-selling perishables between POS syncs. Leave blank to disable —
  // the site then relies only on the baked-in PRODUCTS.inStock flag and works exactly the same otherwise.
  stockSheetUrl: "",
  stockSheetTimeoutMs: 3000,

  // Google Apps Script (or similar) endpoint that logs each order as structured JSON. Leave blank to disable.
  // Fire-and-forget: a slow/failing webhook must never block or delay the WhatsApp handoff.
  webhookUrl: "",
};

/* Catalog: emoji keeps it image-free (loads instantly on any phone).
   mrp is optional — when present the card shows a strike-through price.
   id doubles as the POS item_code — the stock-override sheet and the order webhook both join on it,
   so never renumber an existing product; append new ones with the next free id.
   inStock is optional (default true) — the POS sync script will flip this daily; the stock-override
   sheet can additionally override it per branch between syncs. */
const PRODUCTS = [
  // Dairy — the anchor category, listed first
  { id:1,  cat:"Dairy",        emoji:"🥛", name:"Toned Milk",              pack:"500 ml pouch",  price:28 },
  { id:2,  cat:"Dairy",        emoji:"🥛", name:"Full Cream Milk",         pack:"500 ml pouch",  price:35 },
  { id:3,  cat:"Dairy",        emoji:"🍶", name:"Fresh Curd",              pack:"400 g cup",     price:40, mrp:45,

/* ================================================================
   APP LOGIC — no edits needed below this line
   ================================================================ */
const cart = new Map();           // id -> qty (in-memory)
let activeCat = "All";
let activeSlot = 0;
let activeSub = 0;
let query = "";
let stockOverrides = {};          // { branch_slug: { item_code: true|false } } — from the staff override sheet

const CATS = ["All", ...new Set(PRODUCTS.map(p => p.cat))];
const rupee = n => "₹" + n.toLocaleString("en-IN");

/* ---- init branch picker ---- */
const branchSel = document.getElementById("branch");
STORE.branches.forEach((b,i) => {
  const o = document.createElement("option");
  o.value = i; o.textContent = b.name;
  branchSel.appendChild(o);
});
branchSel.addEventListener("change", renderCatalog);

/* ---- pre-select branch from ?branch=slug (shared per-branch links / QR codes) ---- */
const branchSlugParam = new URLSearchParams(location.search).get("branch");
if(branchSlugParam){
  const idx = STORE.branches.findIndex(b => b.slug === branchSlugParam.trim().toLowerCase());
  if(idx > -1){
    branchSel.value = idx;
    document.getElementById("branchPick").style.display = "none";
  }
}

/* ---- init slots ---- */
const slotsEl = document.getElementById("slots");
STORE.slots.forEach((s,i) => {
  const b = document.createElement("button");
  b.className = "slot" + (i===0 ? " active" : "");
  b.textContent = s;
  b.onclick = () => { activeSlot = i;
    [...slotsEl.children].forEach((c,j)=>c.classList.toggle("active", j===i)); };
  slotsEl.appendChild(b);
});

/* ---- init substitution preference ---- */
const subEl = document.getElementById("subPref");
STORE.substitutionOptions.forEach((opt,i) => {
  const b = document.createElement("button");
  b.className = "sub-opt" + (i===0 ? " active" : "");
  b.textContent = opt.label;
  b.onclick = () => { activeSub = i;
    [...subEl.children].forEach((c,j)=>c.classList.toggle("active", j===i)); };
  subEl.appendChild(b);
});

/* ---- init monthly basket banner ---- */
document.getElementById("basketCount").textContent =
  STORE.monthlyBasket.length + " everyday essentials, one tap";

/* ---- init confirmation SLA note ---- */
document.getElementById("slaNote").textContent = STORE.confirmationSla;

/* ---- chips ---- */
const chipsEl = document.getElementById("chips");
function renderChips(){
  chipsEl.innerHTML = "";
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c===activeCat ? " active" : "");
    b.textContent = c;
    b.onclick = () => { activeCat = c; renderChips(); renderCatalog(); };
    chipsEl.appendChild(b);
  });
}

/* ---- stock availability (baked-in inStock, overridden per-branch by the staff sheet) ---- */
function isAvailable(p){
  const branch = STORE.branches[branchSel.value];
  const branchOverrides = stockOverrides[branch.slug];
  const key = String(p.id);
  if(branchOverrides && Object.prototype.hasOwnProperty.call(branchOverrides, key)) return branchOverrides[key];
  return p.inStock !== false;
}

/* ---- catalog ---- */
const catalogEl = document.getElementById("catalog");
function visibleProducts(){
  return PRODUCTS.filter(p =>
    (activeCat==="All" || p.cat===activeCat) &&
    (query==="" || (p.name+" "+p.cat).toLowerCase().includes(query))
  );
}
function renderCatalog(){
  const items = visibleProducts();
  catalogEl.innerHTML = "";
  if(!items.length){
    catalogEl.innerHTML = `<div class="empty-msg">Nothing matches "<b>${query}</b>".<br>Can't find something? Add it as a note in WhatsApp after ordering — we'll get it.</div>`;
    return;
  }
  let lastCat = null;
  let grid = null;
  items.forEach(p => {
    if(activeCat==="All" && p.cat!==lastCat){
      lastCat = p.cat;
      const lab = document.createElement("div");
      lab.className = "section-label"; lab.textContent = p.cat;
      catalogEl.appendChild(lab);
      grid = document.createElement("div"); grid.className="grid";
      catalogEl.appendChild(grid);
    } else if(activeCat!=="All" && !grid){
      grid = document.createElement("div"); grid.className="grid";
      catalogEl.appendChild(grid);
    }
    grid.appendChild(card(p));
  });
}
function card(p){
  const qty = cart.get(p.id) || 0;
  const available = isAvailable(p);
  const el = document.createElement("div");
  el.className = "card" + (qty ? " in-cart" : "") + (available ? "" : " out-of-stock");
  el.innerHTML = `
    <div class="emoji">${p.emoji}</div>
    <div class="p-name">${p.name}</div>
    <div class="p-pack">${p.pack}</div>
    ${available ? "" : `<div class="stock-badge">${qty ? "May be unavailable" : "Out of stock — back soon"}</div>`}
    <div class="p-row">
      <div class="p-price">${rupee(p.price)}${p.mrp ? `<small>${rupee(p.mrp)}</small>` : ""}</div>
      <div class="ctrl"></div>
    </div>`;
  el.querySelector(".ctrl").appendChild(qtyControl(p));
  el.onclick = e => { if(e.target.closest("button")) return; openDetail(p.id); };
  return el;
}
function qtyControl(p){
  const qty = cart.get(p.id) || 0;
  const available = isAvailable(p);
  if(!qty){
    const b = document.createElement("button");
    if(!available){
      b.className = "add-btn disabled"; b.textContent = "Unavailable"; b.disabled = true;
      return b;
    }
    b.className = "add-btn"; b.textContent = "ADD";
    b.onclick = () => setQty(p.id, 1);
    return b;
  }
  const s = document.createElement("div");
  s.className = "stepper";
  s.innerHTML = `<button aria-label="less">−</button><span class="qty">${qty}</span><button aria-label="more"${available ? "" : " disabled"}>+</button>`;
  const [minus, plus] = s.querySelectorAll("button");
  minus.onclick = () => setQty(p.id, qty-1);
  if(available) plus.onclick = () => setQty(p.id, qty+1);
  return s;
}
function setQty(id, q){
  if(q<=0) cart.delete(id); else cart.set(id, q);
  renderCatalog(); renderCartBar();
  if(document.getElementById("sheet").classList.contains("show")) renderSheet();
  if(detailId===id && document.getElementById("detailSheet").classList.contains("show")) renderDetail();
}

/* ---- product detail sheet ---- */
let detailId = null;
function openDetail(id){
  detailId = id; renderDetail();
  document.getElementById("overlay").classList.add("show");
  document.getElementById("overlay").onclick = closeDetail;
  document.getElementById("detailSheet").classList.add("show");
}
function closeDetail(){
  document.getElementById("detailSheet").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("overlay").onclick = closeSheet;
}
function renderDetail(){
  const p = PRODUCTS.find(x=>x.id===detailId);
  if(!p) return;
  document.getElementById("dEmoji").textContent = p.emoji;
  document.getElementById("dBrand").textContent = p.brand || "Store-selected brand";
  document.getElementById("dName").textContent = p.name;
  document.getElementById("dPack").textContent = p.pack + " · " + p.cat;
  document.getElementById("dDesc").textContent = p.desc ||
    "Stocked fresh at all DailyGrocer branches. Ask us on WhatsApp if you prefer a different brand or pack size — we usually have it.";
  document.getElementById("dPrice").textContent = rupee(p.price);
  document.getElementById("dMrp").textContent = p.mrp ? rupee(p.mrp) : "";
  document.getElementById("dSave").textContent = p.mrp ? "You save " + rupee(p.mrp - p.price) : "";
  document.getElementById("dSave").style.display = p.mrp ? "" : "none";
  const act = document.getElementById("dActions");
  act.innerHTML = "";
  const available = isAvailable(p);
  if(!available){
    const qty = cart.get(p.id) || 0;
    const badge = document.createElement("div");
    badge.className = "stock-badge"; badge.style.marginBottom = "10px";
    badge.textContent = qty ? "May be unavailable" : "Out of stock — back soon";
    act.appendChild(badge);
  }
  act.appendChild(qtyControl(p));
}

/* ---- totals ---- */
function totals(){
  let items = 0, count = 0;
  cart.forEach((q,id) => { const p = PRODUCTS.find(x=>x.id===id); items += p.price*q; count += q; });
  const delivery = (items===0 || items>=STORE.freeDeliveryAbove) ? 0 : STORE.deliveryFee;
  return { items, count, delivery, grand: items+delivery };
}

/* ---- sticky bar ---- */
function renderCartBar(){
  const t = totals();
  const bar = document.getElementById("cartBar");
  bar.classList.toggle("show", t.count>0);
  document.getElementById("barTotal").textContent = rupee(t.items);
  document.getElementById("barCount").textContent = t.count + (t.count===1?" item":" items");
}

/* ---- sheet ---- */
function openSheet(){ renderSheet();
  document.getElementById("overlay").classList.add("show");
  document.getElementById("sheet").classList.add("show"); }
function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("sheet").classList.remove("show"); }

function renderSheet(){
  const wrap = document.getElementById("receiptItems");
  wrap.innerHTML = "";
  document.getElementById("sheetBranch").textContent =
    STORE.branches[branchSel.value].name + " branch · pay on delivery";
  cart.forEach((q,id) => {
    const p = PRODUCTS.find(x=>x.id===id);
    const row = document.createElement("div");
    row.className = "r-item";
    row.innerHTML = `
      <div class="r-name"><div class="n">${p.emoji} ${p.name}</div><div class="p">${p.pack} · ${rupee(p.price)}</div></div>
      <div class="r-stepper"><button>−</button><span class="qty">${q}</span><button>+</button></div>
      <div class="r-amt">${rupee(p.price*q)}</div>`;
    const [minus, plus] = row.querySelectorAll("button");
    minus.onclick = () => setQty(id, q-1);
    plus.onclick  = () => setQty(id, q+1);
    wrap.appendChild(row);
  });
  const t = totals();
  document.getElementById("tItems").textContent = rupee(t.items);
  document.getElementById("tDelivery").textContent = t.delivery ? rupee(t.delivery) : "FREE";
  document.getElementById("tGrand").textContent = rupee(t.grand);
  const note = document.getElementById("freeNote");
  if(t.items>0 && t.items < STORE.freeDeliveryAbove)
    note.innerHTML = `<span class="almost-note">Add ${rupee(STORE.freeDeliveryAbove - t.items)} more for free delivery</span>`;
  else if(t.items >= STORE.freeDeliveryAbove)
    note.innerHTML = `<span class="free-note">✓ Free delivery unlocked</span>`;
  else note.innerHTML = "";
  if(t.count===0) closeSheet();
}

/* ---- order field validation ---- */
function setFieldError(inputEl, errEl, message){
  inputEl.classList.toggle("invalid", !!message);
  errEl.textContent = message || "";
  errEl.classList.toggle("show", !!message);
}
function validateOrderFields(){
  const nameEl = document.getElementById("custName");
  const addrEl = document.getElementById("custAddr");
  const nameErr = document.getElementById("custNameErr");
  const addrErr = document.getElementById("custAddrErr");
  const name = nameEl.value.trim();
  const addr = addrEl.value.trim();
  let firstInvalid = null;

  setFieldError(nameEl, nameErr, name ? "" : "Please enter your name.");
  if(!name) firstInvalid = firstInvalid || nameEl;

  setFieldError(addrEl, addrErr, addr.length >= 8 ? "" : "Please enter a complete delivery address.");
  if(addr.length < 8) firstInvalid = firstInvalid || addrEl;

  if(firstInvalid){ firstInvalid.focus(); return false; }
  return true;
}
document.getElementById("custName").addEventListener("input", function(){ setFieldError(this, document.getElementById("custNameErr"), ""); });
document.getElementById("custAddr").addEventListener("input", function(){ setFieldError(this, document.getElementById("custAddrErr"), ""); });

/* ---- order message (shared by WhatsApp send + copy) ---- */
function buildOrderMessage(){
  const t = totals();
  const branch = STORE.branches[branchSel.value];
  const name = document.getElementById("custName").value.trim();
  const addr = document.getElementById("custAddr").value.trim();

  const divider = "------------------------------";
  let lines = [];
  lines.push(`*${STORE.name.toUpperCase()} — ORDER RECEIPT*`);
  lines.push(`Branch: ${branch.name}`);
  lines.push(divider);
  lines.push("");
  lines.push("*ITEMS*");
  let i = 1;
  cart.forEach((q,id) => {
    const p = PRODUCTS.find(x=>x.id===id);
    lines.push(`${i}. ${p.name} (${p.pack})`);
    lines.push(`    Qty: ${q} x ${rupee(p.price)} = ${rupee(p.price*q)}`);
    i++;
  });
  lines.push("");
  lines.push(divider);
  lines.push(`Items Total: ${rupee(t.items)}`);
  lines.push(`Delivery: ${t.delivery ? rupee(t.delivery) : "FREE"}`);
  lines.push(`*Grand Total: ${rupee(t.grand)}*`);
  lines.push("(Pay on Delivery)");
  lines.push(divider);
  lines.push("");
  lines.push("*DELIVERY DETAILS*");
  lines.push(`Slot: ${STORE.slots[activeSlot]}`);
  lines.push(`If unavailable: ${STORE.substitutionOptions[activeSub].label}`);
  if(name) lines.push(`Name: ${name}`);
  if(addr) lines.push(`Address: ${addr}`);
  lines.push("");
  lines.push(`Thank you for ordering with ${STORE.name}!`);
  return lines.join("\n");
}

/* ---- order log webhook: fire-and-forget, never blocks/delays the WhatsApp handoff ---- */
function postOrderWebhook(){
  if(!STORE.webhookUrl) return;
  const t = totals();
  const branch = STORE.branches[branchSel.value];
  const items = [];
  cart.forEach((q,id) => {
    const p = PRODUCTS.find(x=>x.id===id);
    items.push({ item_code:String(p.id), name:p.name, qty:q, unit_price:p.price });
  });
  const payload = {
    branch: branch.slug,
    items,
    items_total: t.items,
    delivery: t.delivery,
    grand_total: t.grand,
    slot: STORE.slots[activeSlot],
    substitution_preference: STORE.substitutionOptions[activeSub].value,
    name: document.getElementById("custName").value.trim(),
    address: document.getElementById("custAddr").value.trim(),
    timestamp: new Date().toISOString(),
  };
  // mode:"no-cors" + text/plain avoids a CORS preflight against Apps Script endpoints;
  // the response is opaque, which is fine since we never read it — failures are caught and ignored.
  fetch(STORE.webhookUrl, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload),
  }).catch(() => {});
}

function sendToWhatsApp(){
  const t = totals();
  if(t.count===0) return;
  if(!validateOrderFields()) return;
  const branch = STORE.branches[branchSel.value];
  const url = "https://wa.me/" + branch.phone + "?text=" + encodeURIComponent(buildOrderMessage());
  postOrderWebhook();
  window.open(url, "_blank");
}

function copyOrder(){
  const t = totals();
  if(t.count===0) return;
  if(!validateOrderFields()) return;
  const btn = document.getElementById("copyBtn");
  navigator.clipboard.writeText(buildOrderMessage()).then(() => {
    const original = btn.textContent;
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 1800);
  });
}

/* ---- search ---- */
document.getElementById("search").addEventListener("input", e => {
  query = e.target.value.trim().toLowerCase();
  renderCatalog();
});

/* ---- monthly basket: one tap adds every in-stock preset item ---- */
function addMonthlyBasket(){
  const skipped = [];
  STORE.monthlyBasket.forEach(entry => {
    const p = PRODUCTS.find(x=>x.id===entry.id);
    if(!p) return;
    if(!isAvailable(p)){ skipped.push(p.name); return; }
    cart.set(p.id, entry.qty);
  });
  renderCatalog(); renderCartBar();
  if(document.getElementById("sheet").classList.contains("show")) renderSheet();
  const notice = document.getElementById("basketNotice");
  notice.textContent = skipped.length ? `Skipped (out of stock): ${skipped.join(", ")}` : "";
  notice.classList.toggle("show", skipped.length>0);
}

/* ---- staff stock-override sheet: non-blocking, fails open (site works identically if unset/unreachable) ---- */
function loadStockOverrides(){
  if(!STORE.stockSheetUrl) return;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), STORE.stockSheetTimeoutMs || 3000);
  fetch(STORE.stockSheetUrl, { signal: controller.signal })
    .then(res => res.ok ? res.text() : "")
    .then(text => {
      if(!text) return;
      const map = {};
      text.trim().split("\n").forEach(row => {
        const [itemCode, branchSlug, available] = row.split(",").map(c => c.trim().replace(/^"|"$/g,""));
        if(!itemCode || !branchSlug || itemCode.toLowerCase()==="item_code") return;
        if(!map[branchSlug]) map[branchSlug] = {};
        map[branchSlug][itemCode] = (available||"").toUpperCase() === "Y";
      });
      stockOverrides = map;
      renderCatalog();
      if(document.getElementById("detailSheet").classList.contains("show")) renderDetail();
    })
    .catch(() => { /* unreachable/slow/malformed sheet — keep relying on baked-in inStock only */ })
    .finally(() => clearTimeout(timer));
}

/* ---- boot ---- */
renderChips();
renderCatalog();
renderCartBar();
loadStockOverrides();
